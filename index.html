<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG x Jack | EXOTIC NEON NIGHT</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:ital,wght@1,900&family=Bebas+Neue&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --neon-main: #00D2BE; 
            --neon-light: #E0FFFF; 
            --neon-glow: rgba(0, 210, 190, 0.4);
            --glass: rgba(0, 0, 0, 0.95);
            --gold: #FFD700;
            --ms-font: "Microsoft YaHei", "微軟雅黑", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-deep); color: #fff; font-family: var(--ms-font);
            line-height: 1.6; width: 100vw; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* --- 背景動畫 --- */
        .page-background-stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: -2; pointer-events: none; }
        .page-background-image {
            position: absolute; bottom: -40%; left: -40%; width: 180%; height: 180%;
            background-image: url('https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/Creator_bg.jpg'); 
            background-size: cover; background-position: center;
            opacity: 0.65; animation: bg-cinematic-slide 40s ease-in-out infinite;
            will-change: transform; transform: translateZ(0);
        }
        @keyframes bg-cinematic-slide { 0% { transform: translate(0%, 0%); } 50% { transform: translate(5%, -5%); } 100% { transform: translate(0%, 0%); } }

        /* --- Header --- */
        .top-header { padding: 30px 10px 10px; text-align: center; z-index: 10; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo-img { height: 32px; filter: drop-shadow(0 0 10px var(--neon-main)); }
        .small-title { font-size: 1.6rem; font-weight: 900; text-shadow: 0 0 10px var(--neon-main); }

        /* --- 主舞台 --- */
        .main-pk-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 10px 10px 30px; }
        .instruction-main { 
            font-family: 'Noto Sans TC', sans-serif; font-size: 2.5rem; font-weight: 900; 
            color: #fff; text-shadow: 3px 3px 0px #000, 0 0 15px var(--neon-glow);
            margin-bottom: 5px; text-align: center; 
        }
        .global-hook { font-size: 1.1rem; font-weight: bold; color: var(--neon-light); letter-spacing: 1px; margin-bottom: 10px; text-align: center; }
        .pk-sub-header { 
            font-family: 'Noto Serif TC', serif; font-style: italic; font-size: 1.4rem; 
            letter-spacing: 4px; color: var(--neon-main); margin-bottom: 30px; text-align: center;
            animation: intense-breathe 2.5s infinite ease-in-out;
        }
        @keyframes intense-breathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 5px var(--neon-glow); opacity: 0.7; }
            50% { transform: scale(1.1); text-shadow: 0 0 25px var(--neon-main), 0 0 40px #fff; opacity: 1; color: #fff; }
        }

        /* PK 模組 */
        .versus-module { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; position: relative; padding: 0 10px; margin-bottom: 25px; }
        
        /* babe-card 核心：解決黑邊與殘影 */
        .babe-card { 
            position: relative; cursor: pointer; overflow: hidden; background: #000; border: 2px solid #222;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.4s ease;
            animation: card-wait-pulse 3s infinite ease-in-out; 
            will-change: transform; transform: translateZ(0);
        }
        @keyframes card-wait-pulse { 0%, 100% { transform: scale(1); border-color: #222; } 50% { transform: scale(1.02); border-color: var(--neon-main); box-shadow: 0 0 15px var(--neon-glow); } }
        
        .babe-card img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; object-position: center top; display: block;
            opacity: 0.9; transition: opacity 0.3s ease; 
        }

        .vs-sign { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: #fff; text-shadow: 0 0 20px var(--neon-main); z-index: 11; flex-shrink: 0; }

        /* 桌機版尺寸固定 */
        @media (min-width: 801px) {
            .babe-card { flex: 0 0 350px; width: 350px; height: 350px; }
            .winner-move-to-left { animation: slideWinnerLeftPC 0.6s forwards !important; }
            @keyframes slideWinnerLeftPC { to { transform: translateX(-370px); } }
        }

        /* 手機版尺寸動態 */
        @media (max-width: 800px) {
            .versus-module { gap: 10px; padding: 0 5px; }
            .babe-card { flex: 0 0 calc(50vw - 12px); width: calc(50vw - 12px); aspect-ratio: 1/1; }
            .vs-sign { font-size: 2.2rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; background: rgba(0,0,0,0.5); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
            .instruction-main { font-size: 1.6rem; }
            .winner-move-to-left { animation: slideWinnerLeftMob 0.6s forwards !important; }
            @keyframes slideWinnerLeftMob { to { transform: translateX(calc(-50vw + 2px)); } }
            .name-meta { font-size: 1.2rem; }
            .intro-text { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        }

        .name-meta { font-size: 1.6rem; font-weight: 900; color: #fff; text-shadow: 0 2px 10px #000; }
        .intro-text { font-size: 0.9rem; color: var(--neon-main); font-weight: bold; margin-top: 2px; }

        /* 進度條 */
        .progress-wrap { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 10px; }
        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: var(--neon-main); box-shadow: 0 0 15px var(--neon-main); transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .progress-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--neon-main); letter-spacing: 2px; }

        .flag-tag { position: absolute; top: 10px; left: 10px; font-size: 1.5rem; z-index: 5; }
        .info-panel { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.95) 75%); text-align: left; }

        /* --- Footer --- */
        .promo-footer { background: var(--glass); border-top: 2px solid var(--neon-main); padding: 25px 15px 15px; display: flex; flex-direction: column; align-items: center; z-index: 100; text-align: center; margin-top: auto; }
        .promo-title { font-size: 1.4rem; color: var(--neon-light); font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 10px var(--neon-main); }
        .promo-desc { font-size: 1.1rem; color: #eee; margin-bottom: 15px; max-width: 700px; }
        .promo-desc b { color: var(--neon-main); }
        .promo-row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .promo-copy-wrap { display: flex; align-items: center; background: #000; padding: 4px 4px 4px 12px; border: 1px solid #444; border-radius: 4px; }
        .promo-code { font-size: 1.4rem; font-weight: 900; color: #fff; font-family: 'Bebas Neue', sans-serif; margin-right: 10px; letter-spacing: 2px;}
        .promo-btn { background: var(--neon-main); color: #000; border: none; padding: 6px 15px; font-weight: 900; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .promo-btn:hover { background: #fff; }
        .btn-register-footer { width: 100%; max-width: 450px; background: transparent; border: 2px solid var(--neon-main); color: var(--neon-main); padding: 12px; font-weight: 900; font-size: 1.2rem; letter-spacing: 5px; cursor: pointer; border-radius: 4px; box-shadow: 0 0 10px var(--neon-glow); margin-bottom: 15px; transition: 0.3s; }
        .btn-register-footer:hover { background: var(--neon-main); color: #000; box-shadow: 0 0 25px var(--neon-main); }
        .platform-declare-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); width: 100%; font-size: 1rem; font-weight: 900; white-space: nowrap;}
        .footer-logo-small { height: 16px; filter: drop-shadow(0 0 5px #fff); }

        .loser-exit-left { animation: exitLeft 0.6s forwards !important; }
        @keyframes exitLeft { to { transform: translateX(-150%) scale(0.8); opacity: 0; filter: blur(8px); } }
        .loser-exit-right { animation: exitRight 0.6s forwards !important; }
        @keyframes exitRight { to { transform: translateX(150%) scale(0.8); opacity: 0; filter: blur(8px); } }
        .new-challenger-in { animation: challengerIn 0.6s forwards; }
        @keyframes challengerIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .winner-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: popIn 0.6s ease-out; width: 100%; }
        .winner-final-card { aspect-ratio: 1 / 1 !important; width: min(85vw, 400px) !important; height: auto !important; border-color: var(--neon-main) !important; box-shadow: 0 0 50px var(--neon-glow); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="page-background-stage"><div class="page-background-image"></div></div>

    <header class="top-header">
        <div class="logo-row">
            <img src="https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/SWAG-Logo-White-1200.png" class="logo-img">
            <span class="small-title">x Jack 異國遊</span>
        </div>
    </header>

    <main class="main-pk-stage" id="pkStageContainer">
        <div class="instruction-main">挑出你的心儀直播主</div>
        <div class="global-hook">上千位來自全世界優質直播主 24HR 線上等你</div>
        <h2 class="pk-sub-header" id="pkHeader">今晚，誰是你的嚮導？</h2>
        
        <div class="versus-module" id="pkStage">
            <div class="babe-card" id="card0" onclick="makeChoice(0)">
                <div class="flag-tag" id="flag0"></div>
                <img id="img0">
                <div class="info-panel"><div class="name-meta" id="name0"></div><div class="intro-text" id="intro0"></div></div>
            </div>
            <div class="vs-sign" id="vsSign">VS</div>
            <div class="babe-card" id="card1" onclick="makeChoice(1)">
                <div class="flag-tag" id="flag1"></div>
                <img id="img1">
                <div class="info-panel"><div class="name-meta" id="name1"></div><div class="intro-text" id="intro1"></div></div>
            </div>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-container"><div class="progress-bar" id="pBar"></div></div>
            <div class="progress-text" id="pText">STEP 1 / 6</div>
        </div>
    </main>

    <footer class="promo-footer">
        <h3 class="promo-title">Jack 異國遊粉絲專屬優惠活動</h3>
        <p class="promo-desc">解鎖全球誘惑，新用戶註冊輸入專屬代碼並完成手機綁定，領取 <b>2,000 鑽</b>。</p>

        <div class="promo-row-top">
            <div class="promo-copy-wrap">
                <span class="promo-code" id="pCode">1212HAPPYTALK</span>
                <button class="promo-btn" onclick="copyCode()">複製</button>
            </div>
            <span class="promo-limit">限量 200 位，要換要快</span>
        </div>

        <button class="btn-register-footer" onclick="window.location.href='https://swa9.xyz/kIv3u'">馬上去註冊</button>

        <div class="platform-declare-wrap">
            <img src="https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/SWAG-Logo-White-1200.png" class="footer-logo-small">
            <span>亞洲最大成人直播平台</span> | <span style="color:var(--gold)">未滿 18 歲請勿進入</span>
        </div>
    </footer>

    <script>
        const babes = [
            { name: "娃娃", flag: "🇹🇼", intro: "清純大尺反差", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/%E5%A8%83%E5%A8%83.jpg", link: "https://swa9.xyz/t0oUb" },
            { name: "小甜馨", flag: "🇹🇼", intro: "真誠最溫柔", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/%E5%B0%8F%E7%94%9C%E9%A6%A8.jpg", link: "https://swag.run/vKqbW" },
            { name: "MacyChanHK", flag: "🇭🇰", intro: "喜歡多人運動", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/MacyChanHK.jpg", link: "https://swa9.xyz/10D6K" },
            { name: "柚柚", flag: "🇨🇳", intro: "大眼氣質美女", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/%E6%9F%9A%E6%9F%9A.jpg", link: "https://swag.run/V6d1W" },
            { name: "玲兒", flag: "🇻🇳", intro: "越南人氣網美", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/%E7%8E%B2%E5%85%92.jpg", link: "https://swa9.xyz/ceanu" },
            { name: "Senzuality", flag: "🇪🇺", intro: "反差感超大", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/senzuality.jpg", link: "https://swa9.xyz/y9gNO" },
            { name: "GirlIsOnFire", flag: "🇪🇺", intro: "白皙貌美", img: "https://pub-b817e22edf6447beb72ee04f1adf2d70.r2.dev/0401/girlisonnfire.jpg", link: "https://swa9.xyz/T7b3X" }
        ];

        let pool = [...babes].sort(() => Math.random() - 0.5); 
        let currentChoice = [pool.pop(), pool.pop()]; 
        let totalSteps = babes.length - 1;
        let currentStep = 1;
        let isAnimating = false; 

        function updateProgress() {
            const percent = ((currentStep - 1) / totalSteps) * 100;
            document.getElementById('pBar').style.width = percent + '%';
            document.getElementById('pText').innerText = `STEP ${currentStep} / ${totalSteps}`;
            if (currentStep === totalSteps) {
                document.getElementById('pText').innerText = "FINAL ROUND";
                document.getElementById('pBar').style.background = "#FFD700";
            }
        }

        function renderRound(targetIdx = null) {
            currentChoice.forEach((b, i) => {
                const imgEl = document.getElementById(`img${i}`);
                const flagEl = document.getElementById(`flag${i}`);
                const nameEl = document.getElementById(`name${i}`);
                const introEl = document.getElementById(`intro${i}`);

                if (targetIdx === i || targetIdx === null) {
                    imgEl.style.opacity = '0'; 
                    const tempImg = new Image();
                    tempImg.src = b.img;
                    tempImg.onload = () => {
                        imgEl.src = b.img;
                        flagEl.innerText = b.flag;
                        nameEl.innerText = b.name;
                        introEl.innerText = b.intro;
                        imgEl.style.opacity = '0.9'; 
                    };
                } else {
                    imgEl.src = b.img;
                    flagEl.innerText = b.flag;
                    nameEl.innerText = b.name;
                    introEl.innerText = b.intro;
                }
            });
            updateProgress();
        }

        function makeChoice(idx) {
            if (isAnimating) return;
            isAnimating = true;

            const card0 = document.getElementById('card0');
            const card1 = document.getElementById('card1');
            const vsSign = document.getElementById('vsSign');
            const winner = currentChoice[idx];
            
            if (pool.length > 0) {
                const challenger = pool.pop();
                currentStep++;

                if (idx === 0) { card1.classList.add('loser-exit-right'); } 
                else { card0.classList.add('loser-exit-left'); card1.classList.add('winner-move-to-left'); }
                vsSign.style.opacity = '0';

                setTimeout(() => {
                    card0.classList.remove('loser-exit-left', 'loser-exit-right', 'winner-move-to-left');
                    card1.classList.remove('loser-exit-left', 'loser-exit-right', 'winner-move-to-left');
                    currentChoice = [winner, challenger];
                    renderRound(1);
                    card1.classList.add('new-challenger-in');
                    vsSign.style.opacity = '1';
                    setTimeout(() => { card1.classList.remove('new-challenger-in'); isAnimating = false; }, 600);
                }, 600);
            } else {
                showFinalist(winner);
            }
        }

        function showFinalist(winner) {
            document.querySelector('.instruction-main').style.display = 'none';
            document.querySelector('.global-hook').style.display = 'none';
            document.getElementById('pkHeader').style.display = 'none'; 
            document.getElementById('progressWrap').style.display = 'none';
            
            document.getElementById('pkStage').innerHTML = `
                <div class="winner-stage">
                    <div class="babe-card winner-final-card">
                        <div class="flag-tag">${winner.flag}</div>
                        <div style="position:absolute;top:10px;right:10px;background:var(--gold);color:#000;padding:4px 12px;border-radius:20px;font-weight:900;font-size:0.75rem;z-index:6">👑 Winner</div>
                        <img src="${winner.img}" style="opacity:1">
                        <div class="info-panel">
                            <div class="name-meta" style="font-size:2rem">${winner.name}</div>
                            <div class="intro-text">今晚就決定是你了。</div>
                        </div>
                    </div>
                    <button class="btn-register-footer" style="margin-top:25px; background:var(--neon-main); color:#000; box-shadow:0 0 30px var(--neon-glow);" onclick="window.location.href='${winner.link}'">觀看私密內容</button>
                </div>
            `;
        }

        function copyCode() { navigator.clipboard.writeText("1212HAPPYTALK"); alert("代碼已複製！"); }
        renderRound();
    </script>
</body>
</html>
